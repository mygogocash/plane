name: Cloudflare CI/CD

on:
  workflow_dispatch:
    inputs:
      run_live_baseline:
        description: "Run live baseline checks against manut.xyz and app.manut.xyz"
        required: true
        default: false
        type: boolean
      deploy_target:
        description: "Optional Cloudflare Worker deploy target"
        required: true
        default: "none"
        type: choice
        options:
          - "none"
          - "preview"
          - "production"
      apply_d1_migrations:
        description: "Apply D1 migrations for the selected deploy target"
        required: true
        default: false
        type: boolean
      run_r2_manifest_validation:
        description: "Run synthetic R2 manifest validation"
        required: true
        default: true
        type: boolean
      cloudflare_preview_url:
        description: "Optional deployed preview Worker URL for smoke checks"
        required: false
        default: ""
        type: string
  pull_request:
    branches:
      - "preview"
    paths:
      - "apps/cloudflare/**"
      - ".github/workflows/cloudflare-ci-cd.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "process/features/cloudflare-stack-migration/**"
      - "docs/cloudflare-stack-migration.md"
  push:
    branches:
      - "preview"
    paths:
      - "apps/cloudflare/**"
      - ".github/workflows/cloudflare-ci-cd.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "process/features/cloudflare-stack-migration/**"
      - "docs/cloudflare-stack-migration.md"

permissions:
  contents: read

env:
  NODE_VERSION: "22.18.0"

jobs:
  validate-cloudflare-foundation:
    name: Validate Cloudflare foundation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack and pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check Cloudflare Worker
        run: pnpm --filter @manut/cloudflare check

      - name: Test Cloudflare Worker
        run: pnpm --filter @manut/cloudflare test

      - name: Dry-run Cloudflare Worker bundle
        run: pnpm --filter @manut/cloudflare exec wrangler deploy --dry-run --env="" --outdir /tmp/manut-cloudflare-worker-dry-run

      - name: Run synthetic D1 row-count validation
        shell: bash
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          cat > "$tmp_dir/postgres-counts.json" <<'JSON'
          {"counts":{"workspaces":1,"projects":2}}
          JSON
          cat > "$tmp_dir/d1-counts.json" <<'JSON'
          [{"table":"workspaces","count":1},{"table":"projects","rows":"2"}]
          JSON
          cat > "$tmp_dir/relationships.json" <<'JSON'
          {"checks":[{"name":"projects.workspace_id","orphanCount":0}]}
          JSON
          pnpm --filter @manut/cloudflare d1:validate-import -- "$tmp_dir/postgres-counts.json" "$tmp_dir/d1-counts.json" --relationships "$tmp_dir/relationships.json" --json --out "$tmp_dir/d1-import-validation.json"

      - name: Run synthetic R2 manifest validation
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_r2_manifest_validation }}
        shell: bash
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          cat > "$tmp_dir/gcs-manifest.json" <<'JSON'
          [{"key":"workspace/logo.png","size":12,"crc32c":"abc"}]
          JSON
          cat > "$tmp_dir/r2-manifest.json" <<'JSON'
          {"objects":[{"name":"workspace/logo.png","metadata":{"size":"12","crc32c":"abc"}}]}
          JSON
          pnpm --filter @manut/cloudflare uploads:validate -- "$tmp_dir/gcs-manifest.json" "$tmp_dir/r2-manifest.json" --json --out "$tmp_dir/r2-manifest-validation.json"

      - name: Run live baseline
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_baseline }}
        run: pnpm --filter @manut/cloudflare baseline

      - name: Write Cloudflare summary
        run: |
          {
            echo "### Cloudflare CI/CD foundation"
            echo ""
            echo "- Worker package: \`@manut/cloudflare\`"
            echo "- Production traffic moved: \`false\`"
            echo "- Worker dry-run: \`passed\`"
            echo "- D1 synthetic row-count validation: \`passed\`"
            echo "- R2 synthetic manifest validation: \`${{ github.event_name != 'workflow_dispatch' || inputs.run_r2_manifest_validation }}\`"
            echo "- Required deploy secret for future phases: \`CLOUDFLARE_API_TOKEN\`"
            echo "- Required deploy variable: \`CLOUDFLARE_ACCOUNT_ID\`"
            echo "- Required future DNS/cutover variable: \`CLOUDFLARE_ZONE_ID\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-cloudflare-worker:
    name: Deploy Cloudflare Worker (${{ inputs.deploy_target }})
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_target != 'none' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - validate-cloudflare-foundation
    permissions:
      contents: read
    environment: ${{ inputs.deploy_target == 'production' && 'cloudflare-production' || 'cloudflare-preview' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack and pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate required Cloudflare deploy credentials
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"

      - name: Apply preview D1 migrations
        if: ${{ inputs.deploy_target == 'preview' && inputs.apply_d1_migrations }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm --filter @manut/cloudflare db:migrate:preview

      - name: Apply production D1 migrations
        if: ${{ inputs.deploy_target == 'production' && inputs.apply_d1_migrations }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm --filter @manut/cloudflare db:migrate:production

      - name: Deploy preview Worker
        if: ${{ inputs.deploy_target == 'preview' }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm --filter @manut/cloudflare deploy:preview

      - name: Deploy production Worker
        if: ${{ inputs.deploy_target == 'production' }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm --filter @manut/cloudflare deploy:production

      - name: Smoke optional preview URL
        if: ${{ inputs.cloudflare_preview_url != '' }}
        shell: bash
        run: |
          set -euo pipefail
          pnpm --filter @manut/cloudflare smoke:worker -- "${{ inputs.cloudflare_preview_url }}" --json --out "$RUNNER_TEMP/cloudflare-preview-smoke.json"
          {
            echo ""
            echo "### Cloudflare preview smoke"
            echo ""
            echo '```json'
            cat "$RUNNER_TEMP/cloudflare-preview-smoke.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload preview smoke report
        if: ${{ inputs.cloudflare_preview_url != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-preview-smoke-${{ inputs.deploy_target }}
          path: ${{ runner.temp }}/cloudflare-preview-smoke.json

      - name: Write deploy summary
        run: |
          {
            echo "### Cloudflare deploy"
            echo ""
            echo "- Target: \`${{ inputs.deploy_target }}\`"
            echo "- D1 migrations requested: \`${{ inputs.apply_d1_migrations }}\`"
            echo "- Production DNS changed: \`false\`"
            echo "- GKE rollback retained: \`true\`"
          } >> "$GITHUB_STEP_SUMMARY"
