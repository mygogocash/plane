name: Plane CI/CD

on:
  workflow_dispatch:
    inputs:
      publish_images:
        description: "Build and publish GHCR images"
        required: true
        default: true
        type: boolean
      deploy_railway:
        description: "Trigger Railway deploy hook after images are published"
        required: true
        default: true
        type: boolean
  pull_request:
    branches:
      - "preview"
    types:
      - "opened"
      - "synchronize"
      - "reopened"
      - "ready_for_review"
  push:
    branches:
      - "preview"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOCKER_PLATFORMS: linux/amd64
  NODE_VERSION: "22.18.0"

jobs:
  metadata:
    name: Prepare metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      branch_tag: ${{ steps.meta.outputs.branch_tag }}
      image_namespace: ${{ steps.meta.outputs.image_namespace }}
      image_registry: ${{ steps.meta.outputs.image_registry }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      version_tag: ${{ steps.meta.outputs.version_tag }}
    steps:
      - name: Normalize image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          raw_ref="${GITHUB_REF_NAME:-preview}"
          branch_tag="$(printf '%s' "$raw_ref" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//')"
          if [ -z "$branch_tag" ]; then
            branch_tag="preview"
          fi
          if [[ ! "$branch_tag" =~ ^[a-z0-9_] ]]; then
            branch_tag="build-${branch_tag}"
          fi

          short_sha="${GITHUB_SHA:0:12}"
          image_namespace="$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"

          {
            echo "branch_tag=$branch_tag"
            echo "image_namespace=$image_namespace"
            echo "image_registry=ghcr.io"
            echo "short_sha=$short_sha"
            echo "version_tag=${branch_tag}-${short_sha}"
          } >> "$GITHUB_OUTPUT"

  web-ci:
    name: Web checks
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack and pnpm
        run: corepack enable pnpm

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Restore Turbo cache
        uses: actions/cache/restore@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm check:format

      - name: Run lint
        run: pnpm check:lint

      - name: Run type checks
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: pnpm check:types

      - name: Run web tests
        run: pnpm --filter=web test

      - name: Save Turbo cache
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}

  api-ci:
    name: API checks
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create API env file
        run: ./setup.sh

      - name: Run API unit tests
        run: docker compose -f docker-compose-test.yml run --rm --build api-tests pytest -m unit

      - name: Tear down API test stack
        if: always()
        run: docker compose -f docker-compose-test.yml down -v

  build-components:
    name: Build component image (${{ matrix.image }})
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    needs:
      - metadata
      - web-ci
      - api-ci
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_images) }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: plane-admin
            context: .
            dockerfile: ./apps/admin/Dockerfile.admin
          - image: plane-backend
            context: ./apps/api
            dockerfile: ./apps/api/Dockerfile.api
          - image: plane-frontend
            context: .
            dockerfile: ./apps/web/Dockerfile.web
          - image: plane-live
            context: .
            dockerfile: ./apps/live/Dockerfile.live
          - image: plane-proxy
            context: ./apps/proxy
            dockerfile: ./apps/proxy/Dockerfile.ce
          - image: plane-space
            context: .
            dockerfile: ./apps/space/Dockerfile.space
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ needs.metadata.outputs.image_registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish component image
        uses: docker/build-push-action@v7.0.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          tags: |
            ${{ needs.metadata.outputs.image_registry }}/${{ needs.metadata.outputs.image_namespace }}/${{ matrix.image }}:${{ needs.metadata.outputs.branch_tag }}
            ${{ needs.metadata.outputs.image_registry }}/${{ needs.metadata.outputs.image_namespace }}/${{ matrix.image }}:${{ needs.metadata.outputs.version_tag }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  build-aio:
    name: Build Railway AIO image
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    needs:
      - metadata
      - build-components
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_images) }}
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up yq for AIO asset generation
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Prepare AIO runtime assets
        run: |
          cd deployments/aio/community
          bash ./build.sh --release "${{ needs.metadata.outputs.version_tag }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ needs.metadata.outputs.image_registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set AIO image output
        id: image
        run: |
          echo "image=${{ needs.metadata.outputs.image_registry }}/${{ needs.metadata.outputs.image_namespace }}/plane-aio-community:${{ needs.metadata.outputs.version_tag }}" >> "$GITHUB_OUTPUT"

      - name: Build and publish AIO image
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./deployments/aio/community
          file: ./deployments/aio/community/Dockerfile.railway
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          tags: |
            ${{ needs.metadata.outputs.image_registry }}/${{ needs.metadata.outputs.image_namespace }}/plane-aio-community:${{ needs.metadata.outputs.branch_tag }}
            ${{ needs.metadata.outputs.image_registry }}/${{ needs.metadata.outputs.image_namespace }}/plane-aio-community:${{ needs.metadata.outputs.version_tag }}
          build-args: |
            COMPONENT_IMAGE_REGISTRY=${{ needs.metadata.outputs.image_registry }}
            COMPONENT_IMAGE_NAMESPACE=${{ needs.metadata.outputs.image_namespace }}
            COMPONENT_IMAGE_TAG=${{ needs.metadata.outputs.version_tag }}
          cache-from: type=gha,scope=plane-aio-community
          cache-to: type=gha,mode=max,scope=plane-aio-community

      - name: Write deployment summary
        run: |
          {
            echo "### Published image"
            echo ""
            echo "\`${{ steps.image.outputs.image }}\`"
            echo ""
            echo "Stable branch tag: \`${{ needs.metadata.outputs.image_registry }}/${{ needs.metadata.outputs.image_namespace }}/plane-aio-community:${{ needs.metadata.outputs.branch_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-railway:
    name: Trigger Railway deployment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - metadata
      - build-aio
    if: ${{ (github.event_name == 'push' && github.ref_name == 'preview') || (github.event_name == 'workflow_dispatch' && inputs.deploy_railway) }}
    environment: preview
    steps:
      - name: Trigger Railway deploy hook
        env:
          AIO_IMAGE: ${{ needs.build-aio.outputs.image }}
          RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail

          if [ -z "${RAILWAY_DEPLOY_HOOK_URL:-}" ]; then
            echo "RAILWAY_DEPLOY_HOOK_URL is not configured. GHCR image is ready: ${AIO_IMAGE}"
            exit 0
          fi

          curl -fsS -X POST "$RAILWAY_DEPLOY_HOOK_URL"
          echo "Triggered Railway deployment for ${AIO_IMAGE}"

      - name: Write Railway summary
        run: |
          {
            echo "### Railway deployment"
            echo ""
            echo "AIO image: \`${{ needs.build-aio.outputs.image }}\`"
            echo ""
            echo "Configure Railway to pull the stable branch tag when using deploy hooks:"
            echo "\`${{ needs.metadata.outputs.image_registry }}/${{ needs.metadata.outputs.image_namespace }}/plane-aio-community:${{ needs.metadata.outputs.branch_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
