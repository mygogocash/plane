name: Railway AIO GHCR Image

on:
  workflow_dispatch:
  push:
    branches:
      - preview
    paths:
      - ".github/workflows/railway-aio-ghcr.yml"
      - "apps/**"
      - "packages/**"
      - "deployments/aio/community/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"

permissions:
  contents: read
  packages: write

concurrency:
  group: railway-aio-ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: mygogocash
  IMAGE_TAG: preview

jobs:
  build-components:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: plane-frontend
            context: .
            file: ./apps/web/Dockerfile.web
          - image: plane-admin
            context: .
            file: ./apps/admin/Dockerfile.admin
          - image: plane-space
            context: .
            file: ./apps/space/Dockerfile.space
          - image: plane-live
            context: .
            file: ./apps/live/Dockerfile.live
          - image: plane-backend
            context: ./apps/api
            file: ./apps/api/Dockerfile.api
          - image: plane-proxy
            context: ./apps/proxy
            file: ./apps/proxy/Dockerfile.ce
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  build-aio:
    name: Build Plane AIO
    runs-on: ubuntu-22.04
    needs: build-components
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push AIO image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./deployments/aio/community/Dockerfile.railway
          platforms: linux/amd64
          push: true
          build-args: |
            IMAGE_REGISTRY=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}
            IMAGE_TAG=${{ env.IMAGE_TAG }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/plane-aio-community:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/plane-aio-community:${{ github.sha }}
          cache-from: type=gha,scope=plane-aio-community
          cache-to: type=gha,mode=max,scope=plane-aio-community
