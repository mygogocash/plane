apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-actions-manut-deployer
  namespace: manut-ce
rules:
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-manut-deployer
  namespace: manut-ce
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: github-actions-manut-deployer
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: github-manut-deployer@affine-495114.iam.gserviceaccount.com
